<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Compass — Learn How Work Flows</title>
    <style>
        /* ─── THEME ─── */
        :root {
            --bg: #0d0f14;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.08);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --border-light: rgba(255, 255, 255, 0.12);
            --text: #eceef2;
            --text-secondary: #9aa8b9;
            --text-muted: #5a6a7a;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --accent-dim: rgba(108, 92, 231, 0.08);
            --green: #4ecdc4;
            --green-dim: rgba(78, 205, 196, 0.12);
            --gold: #feca57;
            --gold-dim: rgba(254, 202, 87, 0.12);
            --red: #ff6b6b;
            --red-dim: rgba(255, 107, 107, 0.12);
            --blue: #54a0ff;
            --blue-dim: rgba(84, 160, 255, 0.12);
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ─── RESET ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }

        #app {
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        /* ─── UTILITY ─── */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-up {
            animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(24px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            transition: var(--transition);
        }
        .card:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 36px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            box-shadow: 0 4px 20px var(--accent-glow);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--accent-glow);
        }
        .btn-primary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-primary.outline {
            background: transparent;
            border: 2px solid var(--accent);
            box-shadow: none;
            color: var(--accent);
        }
        .btn-primary.outline:hover {
            background: var(--accent-dim);
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-light);
            color: var(--text);
        }

        .pill {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .pill-accent {
            background: var(--accent-dim);
            color: var(--accent);
        }
        .pill-green {
            background: var(--green-dim);
            color: var(--green);
        }
        .pill-gold {
            background: var(--gold-dim);
            color: var(--gold);
        }
        .pill-blue {
            background: var(--blue-dim);
            color: var(--blue);
        }
        .pill-red {
            background: var(--red-dim);
            color: var(--red);
        }

        .progress-track {
            background: var(--bg-card);
            border-radius: 40px;
            height: 4px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            border-radius: 40px;
            transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
            background: var(--accent);
        }

        /* ─── WELCOME ─── */
        .welcome {
            text-align: center;
            padding: 30px 0 10px;
        }
        .welcome .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 6px;
        }
        .welcome h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #6c5ce7, #a07ad8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .welcome .sub {
            font-size: 17px;
            color: var(--text-secondary);
            margin: 4px 0 20px;
        }
        .welcome .desc {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 24px;
            line-height: 1.8;
        }

        .workplace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin: 16px 0 24px;
        }
        .workplace-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 12px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            color: var(--text-secondary);
        }
        .workplace-btn:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }
        .workplace-btn.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--text);
        }
        .workplace-btn .emoji {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }
        .workplace-btn .label {
            font-size: 13px;
            font-weight: 500;
        }
        .workplace-btn .other-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            color: var(--text);
            font-size: 13px;
            width: 100%;
            margin-top: 4px;
            font-family: inherit;
            outline: none;
        }
        .workplace-btn .other-input:focus {
            border-color: var(--accent);
        }

        /* ─── STAGE HEADER ─── */
        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stage-header .title-group .stage-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .stage-header .title-group h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
        }
        .stage-header .title-group h2 .highlight {
            color: var(--accent);
        }

        .step-dots {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .step-dots .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .step-dots .dot.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .step-dots .dot.done {
            background: var(--green);
            border-color: var(--green);
        }
        .step-dots .line {
            width: 20px;
            height: 2px;
            background: var(--border);
            transition: var(--transition);
        }
        .step-dots .line.done {
            background: var(--green);
        }

        /* ─── STAGE 1: OWNERSHIP ─── */
        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 22px;
            margin-bottom: 16px;
        }
        .task-card .task-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .task-card .task-title .icon {
            font-size: 24px;
        }
        .task-card .task-desc {
            color: var(--text-secondary);
            font-size: 15px;
            margin-top: 4px;
            line-height: 1.7;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 12px 0;
        }
        .role-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            text-align: center;
            cursor: grab;
            user-select: none;
            transition: var(--transition);
            touch-action: none;
        }
        .role-card:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }
        .role-card:active {
            cursor: grabbing;
        }
        .role-card.dragging {
            opacity: 0.3;
            transform: scale(0.95);
        }
        .role-card .role-emoji {
            font-size: 24px;
            display: block;
        }
        .role-card .role-name {
            font-size: 13px;
            font-weight: 500;
            margin-top: 2px;
        }
        .role-card .role-dept {
            font-size: 11px;
            color: var(--text-muted);
        }
        .role-card.placed {
            border-color: var(--green);
            background: var(--green-dim);
            cursor: default;
            opacity: 0.7;
        }
        .role-card.correct {
            border-color: var(--green);
            background: var(--green-dim);
        }
        .role-card.wrong {
            border-color: var(--red);
            background: var(--red-dim);
        }

        .ownership-slot {
            background: var(--bg-card);
            border: 3px dashed var(--border);
            border-radius: var(--radius);
            padding: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            margin: 12px 0;
            flex-direction: column;
            gap: 6px;
        }
        .ownership-slot.drag-over {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .ownership-slot.has-role {
            border-style: solid;
            border-color: var(--green);
            background: var(--green-dim);
        }
        .ownership-slot .slot-label {
            color: var(--text-muted);
            font-size: 14px;
        }
        .ownership-slot .slot-role {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ownership-slot .slot-role .remove-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
            transition: var(--transition);
        }
        .ownership-slot .slot-role .remove-btn:hover {
            color: var(--red);
        }

        .explanation-box {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 14px 18px;
            margin-top: 12px;
            border-left: 4px solid var(--accent);
            animation: fadeIn 0.4s ease;
        }
        .explanation-box .ex-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--accent);
        }
        .explanation-box .ex-body {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            margin-top: 4px;
        }
        .explanation-box .ex-body .highlight {
            color: var(--text);
            font-weight: 500;
        }

        /* ─── STAGE 2: ROUTING ─── */
        .routing-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px 16px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 2px dashed var(--border);
            min-height: 70px;
            transition: var(--transition);
            margin: 10px 0;
        }
        .routing-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .routing-zone .routing-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: grab;
            user-select: none;
            transition: var(--transition);
            touch-action: none;
        }
        .routing-zone .routing-item:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
        }
        .routing-zone .routing-item:active {
            cursor: grabbing;
        }
        .routing-zone .routing-item.dragging {
            opacity: 0.3;
        }
        .routing-zone .routing-item.placed {
            border-color: var(--green);
            background: var(--green-dim);
            cursor: default;
        }
        .routing-zone .routing-item .remove-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            transition: var(--transition);
        }
        .routing-zone .routing-item .remove-btn:hover {
            color: var(--red);
        }
        .routing-zone .routing-item .arrow {
            color: var(--text-muted);
            font-size: 12px;
        }

        .routing-available {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 0;
        }
        .routing-available .avail-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: grab;
            user-select: none;
            transition: var(--transition);
            touch-action: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .routing-available .avail-item:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
        }
        .routing-available .avail-item:active {
            cursor: grabbing;
        }
        .routing-available .avail-item.dragging {
            opacity: 0.3;
        }
        .routing-available .avail-item.placed {
            opacity: 0.2;
            pointer-events: none;
            cursor: default;
        }

        .routing-flow {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 0;
        }
        .routing-flow .flow-step {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .routing-flow .flow-arrow {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* ─── STAGE 3: COLLABORATION ─── */
        .collab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 12px 0;
        }
        .collab-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            color: var(--text-secondary);
            user-select: none;
        }
        .collab-card:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }
        .collab-card.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--text);
        }
        .collab-card .collab-emoji {
            font-size: 24px;
            display: block;
        }
        .collab-card .collab-name {
            font-size: 13px;
            font-weight: 500;
        }
        .collab-card .collab-dept {
            font-size: 11px;
            color: var(--text-muted);
        }
        .collab-card.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        .collab-card.correct {
            border-color: var(--green);
            background: var(--green-dim);
        }
        .collab-card.wrong {
            border-color: var(--red);
            background: var(--red-dim);
        }

        /* ─── RESULTS ─── */
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 16px 0;
        }
        .results-grid .result-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 20px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .results-grid .result-card .r-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
        }
        .results-grid .result-card .r-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .radar-container {
            max-width: 400px;
            margin: 16px auto;
            position: relative;
        }
        .radar-container svg {
            width: 100%;
            height: auto;
        }

        .reflection-box {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 18px 22px;
            border: 1px solid var(--border);
            margin: 12px 0;
        }
        .reflection-box .ref-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .reflection-box .ref-body {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.8;
            margin-top: 4px;
        }
        .reflection-box .ref-body .highlight {
            color: var(--text);
            font-weight: 500;
        }

        /* ─── CELEBRATION ─── */
        .celebration {
            text-align: center;
            padding: 20px 0;
        }
        .celebration .big-icon {
            font-size: 72px;
            display: block;
            margin-bottom: 8px;
            animation: floatAmbient 3s ease-in-out infinite;
        }
        @keyframes floatAmbient {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .celebration h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
        }
        .celebration p {
            color: var(--text-secondary);
            font-size: 16px;
            max-width: 400px;
            margin: 4px auto 0;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .workplace-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .role-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }
            .results-grid {
                grid-template-columns: 1fr;
            }
            .stage-header .title-group h2 {
                font-size: 18px;
            }
            .card {
                padding: 14px 16px;
            }
            .task-card {
                padding: 14px 16px;
            }
            .collab-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }
            .routing-zone {
                padding: 10px 12px;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .workplace-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .role-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .collab-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .welcome h1 {
                font-size: 28px;
            }
            .btn-primary {
                padding: 10px 24px;
                font-size: 14px;
                width: 100%;
                justify-content: center;
            }
            .routing-zone .routing-item {
                font-size: 12px;
                padding: 4px 12px;
            }
            .routing-available .avail-item {
                font-size: 12px;
                padding: 4px 12px;
            }
            .step-dots .line {
                width: 12px;
            }
        }

        /* ─── KEYBOARD FOCUS ─── */
        button:focus-visible,
        .role-card:focus-visible,
        .workplace-btn:focus-visible,
        .collab-card:focus-visible,
        .routing-item:focus-visible,
        .avail-item:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        /* ─── TOOLTIP ─── */
        .tooltip {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text-secondary);
            border-left: 3px solid var(--accent);
            margin: 8px 0;
            line-height: 1.6;
        }
        .tooltip strong {
            color: var(--text);
        }

        /* ─── CONFETTI ─── */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;

            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function pickN(arr, n) {
                const shuffled = shuffleArray(arr);
                return shuffled.slice(0, n);
            }

            function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

                return [];

                const scenarios = getStageScenarios(stage);
                return Math.min(scenarios.length, 3);

                                        <div class="collab-card ${isSel ? 'selected' : ''} ${isAnswered ? 'disabled' : ''}"
                                             data-dept="${dept.name}"
                                             style="${isAnswered ? 'cursor:default;' : 'cursor:pointer;'}">
                                            <span class="collab-emoji">${dept.emoji}</span>
                                            <span class="collab-name">${dept.name}</span>
                                            <span class="collab-dept">${dept.dept || ''}</span>
                                            ${isSel ? ' ✅' : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>

                            ${!isAnswered ? `
                                <div style="display:flex;gap:10px;flex-wrap:wrap;margin:8px 0;">
                                    <button class="btn-secondary" id="clearCollabBtn" ${selected.length === 0 ? 'disabled' : ''}>
                                        ✕ Clear All
                                    </button>
                                    <button class="btn-primary" id="submitCollabBtn" ${!isComplete ? 'disabled' : ''}>
                                        Submit Collaboration →
                                    </button>
                                </div>
                            ` : ''}

                            ${isAnswered ? `
                                <div class="explanation-box">
                                    <div class="ex-title">✅ Primary Owner: ${answerData.primary}</div>
                                    <div class="ex-body">
                                        <strong>Supporting Teams:</strong> ${answerData.supporting}
                                        <br><br>
                                        <strong>Reasoning:</strong> ${question.reasoning}
                                        <br><br>
                                        <strong>Communication Flow:</strong> ${question.communicationFlow || 'Teams collaborate through regular syncs'}
                                        ${answerData.isCorrect ? ' ✅ You selected the right teams!' : ' ❌ Collaboration involves more than one team — think about who needs to work together.'}
                                    </div>
                                </div>
                            ` : ''}

                            ${!isAnswered ? `
                                <div class="tooltip" style="margin-top:8px;">
                                    💡 <strong>Tip:</strong> Complex problems rarely have a single owner. Think about which teams have the skills, resources, and authority to contribute to the solution.
                                </div>
                            ` : ''}

                            ${isAnswered ? `
                                <div style="display:flex;justify-content:flex-end;margin-top:12px;">
                                    <button class="btn-primary" id="nextStage3Btn">
                                        ${answered < total - 1 ? 'Next Question →' : '📊 See Your Results'}
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `;

                // ─── Selection for Stage 3 ───
                if (!isAnswered) {
                    document.querySelectorAll('.collab-card:not(.disabled)').forEach(card => {
                        card.addEventListener('click', function() {
                            const dept = this.dataset.dept;
                            const idx = state.selectedCollab.indexOf(dept);
                            if (idx > -1) {
                                state.selectedCollab.splice(idx, 1);
                            } else if (state.selectedCollab.length < maxSelect) {
                                state.selectedCollab.push(dept);
                            }
                            renderStage3();
                        });
                    });

                    // Clear
                    const clearBtn = document.getElementById('clearCollabBtn');
                    if (clearBtn) {
                        clearBtn.addEventListener('click', function() {
                            state.selectedCollab = [];
                            renderStage3();
                        });
                    }

                    // Submit
                    const submitBtn = document.getElementById('submitCollabBtn');
                    if (submitBtn) {
                        submitBtn.addEventListener('click', function() {
                            const questionData = getCurrentQuestion('stage3');
                            const correct = questionData.correct || [];
                            const isCorrect = correct.every(c => state.selectedCollab.includes(c)) &&
                                state.selectedCollab.every(c => correct.includes(c));
                            const primary = questionData.primary || correct[0] || 'Multiple teams';
                            const supporting = questionData.supporting || correct.filter(c => c !== primary).join(
                            ', ') || 'Various teams';

                            state.stage3Answers[idx] = {
                                selected: [...state.selectedCollab],
                                isCorrect: isCorrect,
                                primary: primary,
                                supporting: supporting,
                                reasoning: questionData.reasoning || '',
                                communicationFlow: questionData.communicationFlow || ''
                            };
                            if (isCorrect) {
                                state.scores.collaboration += 1;
                            }
                            state.selectedCollab = [];
                            renderStage3();
                        });
                    }
                }

                // Next
                const nextBtn = document.getElementById('nextStage3Btn');
                if (nextBtn) {
                    nextBtn.addEventListener('click', function() {
                        state.stageIndex = state.stage3Answers.length;
                        renderStage3();
                    });
                }

                // Keyboard
                document.addEventListener('keydown', function handler(e) {
                    if (e.key === 'Enter') {
                        if (submitBtn && !submitBtn.disabled) submitBtn.click();
                        else if (nextBtn) nextBtn.click();
                    }
                    document.removeEventListener('keydown', handler);
                });
            }

            // ─── RESULTS ───
            function renderResults() {
                const total1 = Math.min(getStageTotal('stage1'), 3);
                const total2 = Math.min(getStageTotal('stage2'), 3);
                const total3 = Math.min(getStageTotal('stage3'), 3);

                const ownershipScore = state.scores.ownership || 0;
                const delegationScore = state.scores.delegation || 0;
                const collaborationScore = state.scores.collaboration || 0;

                // Workflow thinking = average of delegation and collaboration
                const workflowScore = Math.round((delegationScore + collaborationScore) / 2);

                const maxScore = Math.max(1, total1);
                const ownershipPct = Math.round((ownershipScore / maxScore) * 100);
                const delegationPct = Math.round((delegationScore / Math.max(1, total2)) * 100);
                const collaborationPct = Math.round((collaborationScore / Math.max(1, total3)) * 100);

                // Generate insights
                let insights = [];
                if (ownershipPct >= 80) {
                    insights.push('You have a strong understanding of task ownership — you know who should lead.');
                } else if (ownershipPct >= 50) {
                    insights.push('You have a good grasp of ownership, but sometimes the best owner isn\'t the most obvious choice.');
                } else {
                    insights.push('Ownership is about accountability, not just doing the work. Consider who has the authority and context.');
                }

                if (delegationPct >= 80) {
                    insights.push('You understand workflow routing well — you see how work should flow through an organization.');
                } else if (delegationPct >= 50) {
                    insights.push('You have a sense of workflow, but some tasks may need an extra step or a different order.');
                } else {
                    insights.push('Workflows are about adding value at each step. Think about who needs to see the work and in what order.');
                }

                if (collaborationPct >= 80) {
                    insights.push('You excel at identifying which teams need to work together — complex problems require collaboration.');
                } else if (collaborationPct >= 50) {
                    insights.push('You recognize the need for collaboration, but some problems require even more teams to solve.');
                } else {
                    insights.push('Most real problems are solved by teams, not individuals. Practice thinking about who else needs to be involved.');
                }

                // Over-assignment insight
                let overAssign = 'You tend to assign responsibility appropriately.';
                let underCollaborate = 'You understand the value of collaboration well.';

                const overall = Math.round((ownershipPct + delegationPct + collaborationPct) / 3);

                // Final reflection
                const reflection = `
                            <strong>What you understood well:</strong> ${ownershipPct >= 70 ? 'Ownership and accountability — you know who should take the lead.' : 'You have a foundational understanding of how work moves through organizations.'}
                            <br><br>
                            <strong>Where you tended to over-assign responsibility:</strong> ${delegationPct < 60 ? 'You sometimes added extra steps that may not be necessary. Workflows should be efficient, not just complete.' : 'You generally keep workflows lean and efficient.'}
                            <br><br>
                            <strong>Where you underestimated collaboration:</strong> ${collaborationPct < 60 ? 'Some problems need more teams than you initially thought. Complex issues benefit from diverse perspectives.' : 'You have a strong sense of when to bring in other teams.'}
                            <br><br>
                            <strong>One insight about how organizations actually work:</strong> ${overall >= 70 ? 'Real workplace problems are rarely solved by one person — they require teams working together with clear ownership and efficient workflows.' : 'Organizations function through a combination of clear ownership, efficient routing, and thoughtful collaboration. Each role has a purpose.'}
                        `;

                // Radar chart data
                const radarData = [
                    { label: 'Ownership', value: ownershipPct },
                    { label: 'Delegation', value: delegationPct },
                    { label: 'Collaboration', value: collaborationPct },
                    { label: 'Workflow', value: workflowScore },
                ];

                // Build radar SVG
                const maxVal = 100;
                const size = 300;
                const center = size / 2;
                const radius = size * 0.4;
                const points = radarData.length;

                // Calculate polygon points
                const getPoint = (index, value) => {
                    const angle = (Math.PI * 2 * index) / points - Math.PI / 2;
                    const r = (value / maxVal) * radius;
                    return {
                        x: center + r * Math.cos(angle),
                        y: center + r * Math.sin(angle)
                    };
                };

                // Build grid lines
                let gridLines = '';
                for (let ring = 1; ring <= 4; ring++) {
                    const r = (ring / 4) * radius;
                    let pts = '';
                    for (let i = 0; i < points; i++) {
                        const angle = (Math.PI * 2 * i) / points - Math.PI / 2;
                        const x = center + r * Math.cos(angle);
                        const y = center + r * Math.sin(angle);
                        pts += (i === 0 ? 'M' : 'L') + x + ',' + y;
                    }
                    pts += 'Z';
                    gridLines += `<path d="${pts}" fill="none" stroke="var(--border)" stroke-width="0.5" opacity="0.3"/>`;
                }

                // Build axis lines
                let axisLines = '';
                let labels = '';
                for (let i = 0; i < points; i++) {
                    const angle = (Math.PI * 2 * i) / points - Math.PI / 2;
                    const x = center + radius * Math.cos(angle);
                    const y = center + radius * Math.sin(angle);
                    axisLines += `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="var(--border)" stroke-width="0.5" opacity="0.3"/>`;
                    const labelR = radius + 35;
                    const lx = center + labelR * Math.cos(angle);
                    const ly = center + labelR * Math.sin(angle);
                    labels +=
                        `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--text-secondary)" font-size="11" font-weight="500">${radarData[i].label}</text>`;
                }

                // Build data polygon
                let dataPts = '';
                for (let i = 0; i < points; i++) {
                    const p = getPoint(i, radarData[i].value);
                    dataPts += (i === 0 ? 'M' : 'L') + p.x + ',' + p.y;
                }
                dataPts += 'Z';

                // Build data points
                let dataDots = '';
                for (let i = 0; i < points; i++) {
                    const p = getPoint(i, radarData[i].value);
                    dataDots += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--accent)" stroke="var(--bg)" stroke-width="2"/>`;
                }

                const radarSVG = `
                            <svg viewBox="0 0 ${size} ${size}" width="100%" height="auto" style="max-width:320px;display:block;margin:0 auto;">
                                ${gridLines}
                                ${axisLines}
                                <path d="${dataPts}" fill="var(--accent-dim)" stroke="var(--accent)" stroke-width="2" opacity="0.8"/>
                                ${dataDots}
                                ${labels}
                            </svg>
                        `;

                root.innerHTML = `
                        <div class="fade-in">
                            <div class="celebration">
                                <span class="big-icon">🧭</span>
                                <h2>You've Completed the Compass</h2>
                                <p>Here's how you understand work flowing through organizations.</p>
                            </div>

                            <div class="results-grid">
                                <div class="result-card">
                                    <div class="r-value" style="color:var(--green);">${ownershipPct}%</div>
                                    <div class="r-label">Ownership</div>
                                </div>
                                <div class="result-card">
                                    <div class="r-value" style="color:var(--blue);">${delegationPct}%</div>
                                    <div class="r-label">Delegation</div>
                                </div>
                                <div class="result-card">
                                    <div class="r-value" style="color:var(--gold);">${collaborationPct}%</div>
                                    <div class="r-label">Collaboration</div>
                                </div>
                                <div class="result-card">
                                    <div class="r-value" style="color:var(--accent);">${workflowScore}%</div>
                                    <div class="r-label">Workflow Thinking</div>
                                </div>
                            </div>

                            <div class="radar-container">
                                ${radarSVG}
                            </div>

                            <div class="reflection-box">
                                <div class="ref-title">📖 Final Reflection</div>
                                <div class="ref-body">${reflection}</div>
                            </div>

                            <div style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:16px;">
                                <button class="btn-primary" id="replayBtn">
                                    🔄 Explore Again
                                </button>
                                <button class="btn-secondary" id="topBtn">
                                    📤 Back to Top
                                </button>
                            </div>

                            <div style="margin-top:16px;padding:12px 16px;background:var(--bg-card);border-radius:12px;text-align:center;font-size:12px;color:var(--text-muted);">
                                This is a learning tool about organizational flow. Not a formal assessment.
                            </div>
                        </div>
                    `;

                // Replay
                document.getElementById('replayBtn').addEventListener('click', function() {
                    state.stage = 'welcome';
                    state.stageIndex = 0;
                    state.stage1Answers = [];
                    state.stage2Answers = [];
                    state.stage3Answers = [];
                    state.scores = { ownership: 0, delegation: 0, collaboration: 0, workflow: 0 };
                    state.ownershipSlot = null;
                    state.routingOrder = [];
                    state.routingAvailable = [];
                    state.selectedCollab = [];
                    renderWelcome();
                });

                document.getElementById('topBtn').addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                // Launch confetti
                launchConfetti();

                // Keyboard
                document.addEventListener('keydown', function handler(e) {
                    if (e.key === 'r' || e.key === 'R') {
                        document.getElementById('replayBtn')?.click();
                    }
                    document.removeEventListener('keydown', handler);
                });
            }

            // ─── CONFETTI ───
            function launchConfetti() {
                const container = document.createElement('div');
                container.className = 'confetti-container';
                document.body.appendChild(container);

                const colors = ['#6c5ce7', '#4ecdc4', '#feca57', '#54a0ff', '#ff6b6b', '#a07ad8'];
                for (let i = 0; i < 80; i++) {
                    const el = document.createElement('div');
                    el.className = 'confetti';
                    const size = 4 + Math.random() * 6;
                    const left = Math.random() * 100;
                    const delay = Math.random() * 2;
                    const duration = 2 + Math.random() * 3;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    el.style.cssText = `
                                left: ${left}%;
                                width: ${size}px;
                                height: ${size * 0.6}px;
                                background: ${color};
                                border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                                animation-duration: ${duration}s;
                                animation-delay: ${delay}s;
                                transform: rotate(${Math.random() * 360}deg);
                            `;
                    container.appendChild(el);
                }

                setTimeout(() => {
                    container.remove();
                }, 5000);
            }

            // ─── INIT ───
            renderWelcome();

            console.log('🧭 Task Compass loaded.');
            console.log('📚 Learn how work flows through organizations.');

        })();
    </script>
</body>
</html>
