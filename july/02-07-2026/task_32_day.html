            padding: 0;

            color: #e8edf5;

            padding: 16px;

        }

            width: 5px;
            height: 5px;
        }

            background: #111927;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {

            border-radius: 10px;
        }

            background: #3a5a8a;
        }

            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .slide-up {
            animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }

        .card {

            border: 1px solid #1a2340;

        }
        .card:hover {
            border-color: #2a3a5a;
        }
        .card-glow {
            border-color: #2a3a5a;
            box-shadow: 0 0 40px rgba(0, 180, 255, 0.04);
        }

        .btn-primary {
            background: linear-gradient(135deg, #00b4ff, #0088cc);
            border: none;
            color: #fff;
            padding: 12px 36px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(0, 180, 255, 0.2);

            align-items: center;

        }

            transform: scale(1.03);
            box-shadow: 0 8px 32px rgba(0, 180, 255, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #1a2340;

            color: #e8edf5;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background: #1a2a4a;
            border-color: #3a5a8a;
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #34d399, #059669);

            color: #0b0f1a;
            padding: 12px 36px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(52, 211, 153, 0.2);

            display: inline-flex;

        }
        .btn-success:hover {

            font-weight: 500;

        .btn-choice .choice-desc {

        .progress-track {

            height: 6px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;

        .step-indicator .step-dot.active {

            height: 2px;

        .gap-3 {
            gap: 12px;
        }
        .gap-4 {
            gap: 16px;

        .mt-2 {
            margin-top: 8px;
        }

            margin-top: 12px;

        .mb-2 {

        .hidden {

        }
        .block {

        }
        .w-full {
            width: 100%;
        }
        .relative {
            position: relative;
        }

</head>

        const PERSONAL_PLATFORMS = [

        // Personal brand pillars
        const PERSONAL_PILLARS = [

            { id: 'connection', label: '🤝 Unexpected Connection', desc: 'A notable person engages with your content.' },

        // ─── RANDOM BUSINESS GENERATOR ───
        function generateRandomBusiness() {
            const industry = pick(INDUSTRIES);
            const audience = pick(AUDIENCES);
            const budget = pick(BUDGETS);
            const competitors = [];
            const comps = [...COMPETITORS];
            for (let i = 0; i < rand(2, 4); i++) {
                const c = pick(comps);
                if (!competitors.includes(c)) competitors.push(c);
                const idx = comps.indexOf(c);
                if (idx > -1) comps.splice(idx, 1);
            }
            const challenge = pick(CHALLENGES);
            return {
                industry,
                audience,
                budget,
                competitors,
                challenge,
                name: `${pick(['Apex', 'Blue', 'Cascade', 'Delta', 'Eclipse', 'Fusion', 'Global', 'Horizon', 'Iron', 'Jade', 'Keen', 'Lunar', 'Meridian', 'Nova', 'Orion', 'Pulse', 'Quantum', 'Ridge', 'Summit', 'Titan'])} ${pick(['Brand', 'Co.', 'Studio', 'Collective', 'Works', 'Media', 'Labs', 'Group', 'Partners', 'Ventures'])}`
            };
        }

        // ─── APP ───
        const App = () => {
            // ─── State ───
            const [screen, setScreen] = useState('welcome');
            const [mode, setMode] = useState(null); // 'business', 'personal', 'random'
            const [business, setBusiness] = useState(null);
            const [personalName, setPersonalName] = useState('');
            const [personalNiche, setPersonalNiche] = useState('');
            const [personalStory, setPersonalStory] = useState('');
            const [step, setStep] = useState(0);
            const [selectedPlatforms, setSelectedPlatforms] = useState([]);
            const [selectedPillars, setSelectedPillars] = useState([]);
            const [roadmap, setRoadmap] = useState(null);
            const [eventChoice, setEventChoice] = useState(null);
            const [eventResponse, setEventResponse] = useState(null);
            const [report, setReport] = useState(null);
            const [showClaude, setShowClaude] = useState(true);
            const [copiedPrompt, setCopiedPrompt] = useState(false);

            const totalSteps = 6; // understand, platforms, pillars, roadmap, event, report

            const isPersonal = mode === 'personal';

            // ─── Business / Brand Name ───
            const brandName = isPersonal ? personalName || 'Your Personal Brand' : business?.name || 'Your Business';
            const brandIndustry = isPersonal ? personalNiche || 'Your expertise area' : business?.industry || 'Unknown';
            const brandAudience = isPersonal ? 'Your target audience (people interested in your expertise)' : business
                ?.audience || 'Unknown';
            const brandBudget = isPersonal ? 'Your time and effort' : business?.budget || 'Unknown';

                        </div>

                        <div className="tooltip-box">
                            <strong>📖 What is this?</strong> Social media platforms are channels where you connect with
                            your audience. Each one has different strengths, audiences, and content formats.
                            <br /><br />
                            <strong>💡 Why it matters:</strong> You can't be everywhere. Choosing the right platforms
                            means you reach your audience where they already are, in a format that works for your brand.
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '16px' }}>
                            {platformList.map(p => {
                                const isSelected = selectedPlatforms.includes(p.id);
                                const isDisabled = selectedPlatforms.length >= maxSelect && !isSelected;
                                let suitability = 'Suitable for most brands';
                                if (!isPersonal && p.suitable) {
                                    const match = p.suitable.some(s => brandIndustry.includes(s));
                                    suitability = match ? '✅ Good fit for your industry' :
                                        '⚠️ Consider if your audience is here';
                                }
                                if (isPersonal) {
                                    suitability = p.weight >= 4 ? '✅ Highly recommended for personal brands' :
                                        p.weight >= 3 ? '👍 Good option' :
                                        '⚠️ Consider if your audience is here';
                                }
                                return (
                                    <button key={p.id}
                                    className={`btn-choice ${isSelected ? 'selected' : ''}`}
                                    onClick={() => togglePlatform(p.id)}
                                    disabled={isDisabled}
                                    style={{ textAlign: 'left' }}
                                >
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                            <span style={{ fontSize: '24px' }}>{p.icon}</span>
                                            <div>
                                                <div className="choice-label">{p.label}</div>
                                                <div className="choice-desc">{p.desc}</div>
                                                <div style={{ fontSize: '12px', color: '#6a8aaa', marginTop: '2px' }}>
                                                    {suitability}
                                                </div>
                                            </div>
                                            {isSelected && <span style={{ marginLeft: 'auto', color: '#00b4ff' }}>✓</span>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        <div className="claude-card">
                            <div className="claude-title">🤖 How to ask Claude</div>
                            <div className="claude-prompt">
                                "I'm building a marketing strategy for {isPersonal ? 'my personal brand' : brandName}.
                                I've chosen these platforms: {selectedPlatforms.join(', ') || '[your platforms]'}.
                                Why is this a good platform mix, and what should I prioritize on each one?"
                            </div>
                            <button className="copy-btn" onClick={() => copyPrompt(
                                    `I'm building a marketing strategy for ${isPersonal ? 'my personal brand' : brandName}. I've chosen these platforms: ${selectedPlatforms.join(', ') || '[your platforms]'}. Why is this a good platform mix, and what should I prioritize on each one?`
                                    )}>
                                {copiedPrompt ? '✅ Copied!' : '📋 Copy Prompt'}
                            </button>
                        </div>

                        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '16px', gap: '12px',
                                flexWrap: 'wrap' }}>
                            <button className="btn-secondary" onClick={() => setStep(step - 1)}>← Back</button>
                            <button className="btn-primary" onClick={goToNextStep}
                            disabled={selectedPlatforms.length === 0}>
                                Choose Pillars →
                            </button>
                        </div>
                    </div>
                );
            }

            // ─── Step 3: Content Pillars ───
            if (step === 2) {
                const pillarList = isPersonal ? PERSONAL_PILLARS : CONTENT_PILLARS;
                const maxSelect = 3;

                return (
                    <div className="fade-in">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                marginBottom: '16px', flexWrap: 'wrap', gap: '12px' }}>
                            <div>
                                <h2 style={{ fontSize: '22px', fontWeight: 700, color: '#e8edf5' }}>
                                    📚 Choose Your Content Pillars
                                </h2>
                                <p style={{ color: '#8aabca', fontSize: '14px' }}>
                                    Select exactly {maxSelect} pillars (selected {selectedPillars.length}/{maxSelect})
                                </p>
                            </div>
                            <div className="step-indicator">
                                {stepData.map((s, idx) => (
                                    <React.Fragment key={s.id}>
                                        <div className={`step-dot ${idx < step ? 'done' : idx === step ? 'active' :
                                            ''}`} />
                                        {idx < stepData.length - 1 && (
                                            <div className={`step-line ${idx < step ? 'done' : ''}`} />
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>

                        <div className="tooltip-box">
                            <strong>📖 What is this?</strong> Content pillars are the main themes or categories of
                            content you'll create. They give your content strategy structure and purpose.
                            <br /><br />
                            <strong>💡 Why it matters:</strong> Pillars prevent random posting. They ensure your
                            content is aligned with your goals and consistently building your brand identity.
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '16px' }}>
                            {pillarList.map(p => {
                                const isSelected = selectedPillars.includes(p.id);
                                const isDisabled = selectedPillars.length >= maxSelect && !isSelected;
                                return (
                                    <button key={p.id}
                                    className={`btn-choice ${isSelected ? 'selected' : ''}`}
                                    onClick={() => togglePillar(p.id)}
                                    disabled={isDisabled}
                                    style={{ textAlign: 'left' }}
                                >
                                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px' }}>
                                            <span style={{ fontSize: '22px' }}>{p.icon}</span>
                                            <div>
                                                <div className="choice-label">{p.label}</div>
                                                <div className="choice-desc">{p.desc}</div>
                                                <div style={{ fontSize: '12px', color: '#6a8aaa', marginTop: '2px' }}>
                                                    🎯 {p.goals.join(' · ')}
                                                </div>
                                            </div>
                                            {isSelected && <span style={{ marginLeft: 'auto', color: '#00b4ff' }}>✓</span>}
                                        </div>
                                    </button>
                                );
                            })}
                        </div>

                        <div className="claude-card">
                            <div className="claude-title">🤖 How to ask Claude</div>
                            <div className="claude-prompt">
                                "I've chosen these 3 content pillars for {isPersonal ? 'my personal brand' : brandName}:
                                {selectedPillars.join(', ') || '[your pillars]'}. Can you give me 5 content ideas for
                                each pillar that would resonate with {brandAudience}?"
                            </div>
                            <button className="copy-btn" onClick={() => copyPrompt(
                                    `I've chosen these 3 content pillars for ${isPersonal ? 'my personal brand' : brandName}: ${selectedPillars.join(', ') || '[your pillars]'}. Can you give me 5 content ideas for each pillar that would resonate with ${brandAudience}?`
                                    )}>
                                {copiedPrompt ? '✅ Copied!' : '📋 Copy Prompt'}
                            </button>
                        </div>

                        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '16px', gap: '12px',
                                flexWrap: 'wrap' }}>
                            <button className="btn-secondary" onClick={() => setStep(step - 1)}>← Back</button>
                            <button className="btn-primary" onClick={goToNextStep}
                            disabled={selectedPillars.length !== maxSelect}>
                                Build Roadmap →
                            </button>
                        </div>
                    </div>
                );
            }

            // ─── Step 4: Roadmap ───
            if (step === 3) {
                const weeks = roadmap || generateRoadmap();

                return (
                    <div className="fade-in">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                marginBottom: '16px', flexWrap: 'wrap', gap: '12px' }}>
                            <div>
                                <h2 style={{ fontSize: '22px', fontWeight: 700, color: '#e8edf5' }}>
                                    🗺️ 30-Day Content Roadmap
                                </h2>
                                <p style={{ color: '#8aabca', fontSize: '14px' }}>
                                    Weekly goals and strategy (not individual posts)
                                </p>
                            </div>
                            <div className="step-indicator">
                                {stepData.map((s, idx) => (
                                    <React.Fragment key={s.id}>
                                        <div className={`step-dot ${idx < step ? 'done' : idx === step ? 'active' :
                                            ''}`} />
                                        {idx < stepData.length - 1 && (
                                            <div className={`step-line ${idx < step ? 'done' : ''}`} />
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>

                        <div className="tooltip-box">
                            <strong>📖 What is this?</strong> A content roadmap is a high-level plan that outlines what
                            you'll focus on each week. It keeps you on track and ensures you're building momentum.
                            <br /><br />
                            <strong>💡 Why it matters:</strong> Without a roadmap, content creation becomes reactive and
                            inconsistent. A plan helps you stay focused, measure progress, and adapt.
                        </div>

                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '16px' }}>
                            {weeks.map((w, idx) => (
                                <div key={idx} className="card" style={{ borderColor: '#1a2340' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                                        <span className="pill pill-blue">Week {w.week}</span>
                                        <span style={{ fontWeight: 600, fontSize: '15px' }}>{w.goal}</span>
                                    </div>
                                    <p style={{ color: '#8aabca', fontSize: '14px', lineHeight: 1.5 }}>
                                        {w.strategy}
                                    </p>
                                </div>
                            ))}
                        </div>

                        <div className="claude-card">
                            <div className="claude-title">🤖 How to ask Claude</div>
                            <div className="claude-prompt">
                                "I'm building a 30-day content roadmap for {isPersonal ? 'my personal brand' : brandName}.
                                My platforms are {selectedPlatforms.join(', ')} and my pillars are
                                {selectedPillars.join(', ')}. Can you help me refine this roadmap and suggest metrics to
                                track for each week?"
                            </div>
                            <button className="copy-btn" onClick={() => copyPrompt(
                                    `I'm building a 30-day content roadmap for ${isPersonal ? 'my personal brand' : brandName}. My platforms are ${selectedPlatforms.join(', ')} and my pillars are ${selectedPillars.join(', ')}. Can you help me refine this roadmap and suggest metrics to track for each week?`
                                    )}>
                                {copiedPrompt ? '✅ Copied!' : '📋 Copy Prompt'}
                            </button>
                        </div>

                        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '16px', gap: '12px',
                                flexWrap: 'wrap' }}>
                            <button className="btn-secondary" onClick={() => setStep(step - 1)}>← Back</button>
                            <button className="btn-primary" onClick={goToNextStep}>
                                Handle Unexpected Event →
                            </button>
                        </div>
                    </div>
                );
            }

            // ─── Step 5: Event ───
            if (step === 4) {
                const eventList = isPersonal ? PERSONAL_EVENTS : EVENTS;
                const currentEvent = eventChoice || pick(eventList);

                if (!eventChoice) {
                    setEventChoice(currentEvent);
                }

                const responses = [
                    { id: 'seize', label: '🚀 Seize the Opportunity',
                        desc: 'Lean in, engage publicly, and maximize the moment.' },
                    { id: 'cautious', label: '🤔 Be Cautious & Strategic',
                        desc: 'Take a measured approach, assess before acting.' },
                    { id: 'ignore', label: '🙈 Ignore It',
                        desc: 'Focus on your existing plan and let it pass.' },
                    { id: 'adapt', label: '🔄 Adapt Your Strategy',
                        desc: 'Pivot slightly to incorporate this new dynamic.' },
                ];

                if (!eventResponse) {
                    return (
                        <div className="fade-in">
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                    marginBottom: '16px', flexWrap: 'wrap', gap: '12px' }}>
                                <div>
                                    <h2 style={{ fontSize: '22px', fontWeight: 700, color: '#e8edf5' }}>
                                        ⚡ Unexpected Marketing Event
                                    </h2>
                                    <p style={{ color: '#8aabca', fontSize: '14px' }}>
                                        How will you respond?
                                    </p>
                                </div>
                                <div className="step-indicator">
                                    {stepData.map((s, idx) => (
                                        <React.Fragment key={s.id}>
                                            <div className={`step-dot ${idx < step ? 'done' : idx === step ? 'active' :
                                                ''}`} />
                                            {idx < stepData.length - 1 && (
                                                <div className={`step-line ${idx < step ? 'done' : ''}`} />
                                            )}
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>

                            <div className="card" style={{ marginBottom: '16px', borderColor: '#2a3a5a' }}>
                                <div style={{ fontSize: '28px', marginBottom: '4px' }}>{currentEvent.icon || '📢'}</div>
                                <h3 style={{ fontSize: '18px', fontWeight: 700 }}>{currentEvent.label}</h3>
                                <p style={{ color: '#8aabca', fontSize: '15px' }}>{currentEvent.desc}</p>
                            </div>

                            <div className="tooltip-box">
                                <strong>📖 What is this?</strong> In marketing, unexpected events happen. A viral moment,
                                a crisis, an opportunity — how you respond defines your brand.
                                <br /><br />
                                <strong>💡 Why it matters:</strong> Your response to unexpected events shows your
                                brand's character. Great marketers turn surprises into opportunities.
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px',
                                    marginBottom: '16px' }}>
                                {responses.map(r => (
                                    <button key={r.id} className="btn-choice" onClick={() => handleEventResponse(r.id)}
                                    style={{ textAlign: 'left' }}>
                                        <div className="choice-label">{r.label}</div>
                                        <div className="choice-desc">{r.desc}</div>
                                    </button>
                                ))}
                            </div>

                            <div className="claude-card">
                                <div className="claude-title">🤖 How to ask Claude</div>
                                <div className="claude-prompt">
                                    "I just experienced this marketing event: {currentEvent.label} — {currentEvent.desc}
                                    for {isPersonal ? 'my personal brand' : brandName}. What are 3 strategic ways I could
                                    respond to turn this into a growth opportunity?"
                                </div>
                                <button className="copy-btn" onClick={() => copyPrompt(
                                        `I just experienced this marketing event: ${currentEvent.label} — ${currentEvent.desc} for ${isPersonal ? 'my personal brand' : brandName}. What are 3 strategic ways I could respond to turn this into a growth opportunity?`
                                        )}>
                                    {copiedPrompt ? '✅ Copied!' : '📋 Copy Prompt'}
                                </button>
                            </div>

                            <div style={{ display: 'flex', justifyContent: 'flex-start', marginTop: '16px', gap: '12px',
                                    flexWrap: 'wrap' }}>
                                <button className="btn-secondary" onClick={() => setStep(step - 1)}>← Back</button>
                            </div>
                        </div>
                    );
                }

                // Event response selected — show confirmation then auto-advance
                return (
                    <div className="fade-in">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                                marginBottom: '16px', flexWrap: 'wrap', gap: '12px' }}>
                            <div>
                                <h2 style={{ fontSize: '22px', fontWeight: 700, color: '#e8edf5' }}>
                                    ⚡ Event Response
                                </h2>
                                <p style={{ color: '#8aabca', fontSize: '14px' }}>
                                    You chose: {responses.find(r => r.id === eventResponse)?.label}
                                </p>
                            </div>
                            <div className="step-indicator">
                                {stepData.map((s, idx) => (
                                    <React.Fragment key={s.id}>
                                        <div className={`step-dot ${idx < step ? 'done' : idx === step ? 'active' :
                                            ''}`} />
                                        {idx < stepData.length - 1 && (
                                            <div className={`step-line ${idx < step ? 'done' : ''}`} />
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>
                        </div>

                        <div className="card" style={{ marginBottom: '16px', borderColor: '#34d399' }}>
                            <div style={{ fontSize: '28px', marginBottom: '4px' }}>✅</div>
                            <h3 style={{ fontSize: '18px, font-weight: 700' }}>Response Recorded</h3>
                            <p style={{ color: '#8aabca', fontSize: '15px' }}>
                                You chose to <strong>{responses.find(r => r.id === eventResponse)?.label}</strong>.
                                This decision will influence your final growth report.
                            </p>
                        </div>

                        <div className="claude-card">
                            <div className="claude-title">🤖 How to ask Claude</div>
                            <div className="claude-prompt">
                                "I responded to a {currentEvent.label} by choosing to {responses.find(r => r.id ===
                                    eventResponse)?.label}. How can I measure the impact of this decision on my
                                {isPersonal ? 'personal brand' : 'business'} over the next 30 days?"
                            </div>
                            <button className="copy-btn" onClick={() => copyPrompt(
                                    `I responded to a ${currentEvent.label} by choosing to ${responses.find(r => r.id === eventResponse)?.label}. How can I measure the impact of this decision on my ${isPersonal ? 'personal brand' : 'business'} over the next 30 days?`
                                    )}>
                                {copiedPrompt ? '✅ Copied!' : '📋 Copy Prompt'}
                            </button>
                        </div>

                        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: '16px', gap: '12px',
                                flexWrap: 'wrap' }}>
                            <button className="btn-secondary" onClick={() => setStep(step - 1)}>← Back</button>
                            <button className="btn-success" onClick={goToNextStep}>
                                📊 View Growth Report
                            </button>
                        </div>
                    </div>
                );
            }

            // ─── Step 6: Report (handled in main render) ───
            return null;
        }

        // ─── REPORT SCREEN ───
        if (screen === 'report' && report) {
            const r = report;
            const grade = r.overall >= 85 ? 'A' : r.overall >= 70 ? 'B' : r.overall >= 55 ? 'C' : 'D';

            return (
                <div className="fade-in">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                            marginBottom: '16px', flexWrap: 'wrap', gap: '12px' }}>
                        <h2 style={{ fontSize: '24px', fontWeight: 700, color: '#e8edf5' }}>
                            📊 Growth Report
                        </h2>
                        <span className={`pill ${r.overall >= 80 ? 'pill-green' : r.overall >= 60 ? 'pill-gold' : 'pill-red'}`}
                        style={{ fontSize: '16px', padding: '4px 20px' }}>
                            {grade} — {r.overall}%
                        </span>
                    </div>

                    {/* Score cards */}
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))',
                            gap: '10px', marginBottom: '16px' }}>
                        {[
                            { label: 'Audience Understanding', value: r.audienceScore, color: 'blue' },
                            { label: 'Platform Strategy', value: r.platformScore, color: 'purple' },
                            { label: 'Content Strategy', value: r.contentScore, color: 'gold' },
                            { label: 'Growth Potential', value: r.growthScore, color: 'green' },
                        ].map((item, idx) => (
                            <div key={idx} className="card" style={{ textAlign: 'center' }}>
                                <div style={{ fontSize: '11px', color: '#6a8aaa', fontWeight: 500, textTransform: 'uppercase',
                                        letterSpacing: '0.3px' }}>
                                    {item.label}
                                </div>
                                <div style={{ fontSize: '26px', fontWeight: 700, color: '#e8edf5' }}>{item.value}%</div>
                                <div className="progress-track">
                                    <div className={`progress-fill ${item.color}`} style={{ width: `${item.value}%` }} />
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Best & Worst */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '14px', marginBottom: '16px' }}>
                        <div className="card" style={{ borderColor: '#34d399' }}>
                            <div style={{ fontSize: '13px', color: '#6a8aaa', fontWeight: 600, marginBottom: '4px' }}>
                                🏆 Best Decision
                            </div>
                            <p style={{ color: '#e8edf5', fontSize: '15px' }}>{r.bestDecision}</p>
                        </div>
                        <div className="card" style={{ borderColor: '#f87171' }}>
                            <div style={{ fontSize: '13px', color: '#6a8aaa', fontWeight: 600, marginBottom: '4px' }}>
                                ⚠️ Biggest Mistake
                            </div>
                            <p style={{ color: '#e8edf5', fontSize: '15px' }}>{r.biggestMistake}</p>
                        </div>
                    </div>

                    {/* Lessons */}
                    <div className="card" style={{ marginBottom: '16px' }}>
                        <div style={{ fontSize: '13px', color: '#6a8aaa', fontWeight: 600, marginBottom: '8px' }}>
                            📚 Three Marketing Lessons
                        </div>
                        <ul style={{ listStyle: 'none', padding: 0 }}>
                            {r.lessons.map((lesson, idx) => (
                                <li key={idx} style={{ padding: '6px 0', color: '#8aabca', display: 'flex',
                                        alignItems: 'flex-start', gap: '10px', borderBottom: idx < r.lessons
                                            .length - 1 ? '1px solid #1a2340' : 'none' }}>
                                    <span style={{ color: '#00b4ff', fontWeight: 700 }}>{idx + 1}.</span>
                                    <span>{lesson}</span>
                                </li>
                            ))}
                        </ul>
                    </div>

                    {/* Summary */}
                    <div className="tooltip-box" style={{ marginBottom: '16px' }}>
                        <strong>📊 Summary:</strong> Your marketing strategy for {isPersonal ? 'your personal brand' :
                            brandName} shows
                        {r.overall >= 80 ? ' strong strategic thinking' :
                            r.overall >= 60 ? ' solid foundational understanding' :
                            ' room for growth'}.
                        {isPersonal ?
                            ' Personal branding is a journey — consistency and authenticity are your superpowers.' :
                            ' Keep testing, learning, and iterating to build a resilient brand.'}
                    </div>

                    <div className="claude-card">
                        <div className="claude-title">🤖 How to ask Claude for next steps</div>
                        <div className="claude-prompt">
                            "Based on this marketing strategy for {isPersonal ? 'my personal brand' : brandName}:
                            • Audience: {brandAudience}
                            • Platforms: {selectedPlatforms.join(', ')}
                            • Pillars: {selectedPillars.join(', ')}
                            • Score: {r.overall}%

                            What are 3 specific actions I should take in the next 7 days to move the needle?"
                        </div>
                        <button className="copy-btn" onClick={() => copyPrompt(
                                `Based on this marketing strategy for ${isPersonal ? 'my personal brand' : brandName}:\n• Audience: ${brandAudience}\n• Platforms: ${selectedPlatforms.join(', ')}\n• Pillars: ${selectedPillars.join(', ')}\n• Score: ${r.overall}%\n\nWhat are 3 specific actions I should take in the next 7 days to move the needle?`
                                )}>
                            {copiedPrompt ? '✅ Copied!' : '📋 Copy Prompt'}
                        </button>
                    </div>

                    <div style={{ display: 'flex', justifyContent: 'center', gap: '14px', flexWrap: 'wrap',
                            marginTop: '16px' }}>
                        <button className="btn-success" onClick={reset}>
                            🔄 Play Again
                        </button>
                        <button className="btn-secondary" onClick={() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
                            📤 Back to Top
                        </button>
                    </div>
                </div>
            );
        }

        return null;
    };

    // ─── MOUNT ───
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
