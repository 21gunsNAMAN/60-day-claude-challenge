<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prior Authorization Story Simulator</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        /* ─── custom styles ─── */
        :root {
            --primary: #1a4a7a;
            --primary-light: #2d7ab5;
            --primary-lighter: #4a9bd5;
            --primary-lightest: #dce9f7;
            --bg-warm: #f8faff;
            --rahul-bg: #e3f0ff;
            --rahul-border: #4a9bd5;
            --priya-bg: #f0f7ff;
            --priya-border: #2d7ab5;
            --narrator-color: #4a6a8a;
            --shadow: 0 4px 20px rgba(26, 74, 122, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-warm);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .app-container {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        /* ─── header ─── */
        .app-header {
            background: var(--primary);
            padding: 20px 28px 16px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .app-header h1 span {
            background: rgba(255, 255, 255, 0.12);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
        }
        .app-header .scene-indicator {
            font-size: 14px;
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.10);
            padding: 4px 16px;
            border-radius: 40px;
        }

        /* ─── progress bar ─── */
        .progress-wrap {
            padding: 8px 28px 0 28px;
            background: #fff;
        }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--primary-lighter));
            border-radius: 10px;
            transition: width 0.6s ease;
            width: 0%;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #7a8fa0;
            padding: 4px 0 12px 0;
            font-weight: 500;
        }

        /* ─── chat container ─── */
        .chat-container {
            padding: 20px 28px 12px;
            max-height: 500px;
            overflow-y: auto;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }
        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: #eef4f8;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }

        /* ─── chat bubbles ─── */
        .chat-bubble {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 88%;
            animation: fadeInUp 0.35s ease forwards;
            opacity: 0;
        }
        .chat-bubble.left {
            align-self: flex-start;
        }
        .chat-bubble.right {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .chat-bubble .avatar {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            user-select: none;
        }
        .chat-bubble.left .avatar {
            background: var(--rahul-border);
        }
        .chat-bubble.right .avatar {
            background: var(--priya-border);
        }
        .chat-bubble .bubble {
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            color: #1a2e3f;
            word-break: break-word;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        .chat-bubble.left .bubble {
            background: var(--rahul-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(74, 155, 213, 0.15);
        }
        .chat-bubble.right .bubble {
            background: var(--priya-bg);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(45, 122, 181, 0.12);
        }
        .chat-bubble .bubble .name-tag {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            display: block;
            margin-bottom: 2px;
        }
        .chat-bubble.right .bubble .name-tag {
            color: var(--primary-light);
        }
        .chat-bubble .bubble .msg-text {
            margin: 0;
        }

        /* ─── narrator (centered italic) ─── */
        .narrator-text {
            text-align: center;
            font-style: italic;
            color: var(--narrator-color);
            font-size: 15px;
            padding: 8px 12px;
            background: #f5f9fe;
            border-radius: 12px;
            margin: 4px 0;
            border-left: 3px solid var(--primary-lightest);
            line-height: 1.7;
            max-width: 92%;
            align-self: center;
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }
        .narrator-text strong {
            color: var(--primary);
            font-style: normal;
        }
        .narrator-text .doctor-name {
            color: var(--primary-light);
            font-weight: 600;
            font-style: normal;
        }

        /* ─── choices ─── */
        .choices-container {
            padding: 12px 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #ffffff;
            border-top: 1px solid #eef4f8;
        }
        .choices-container .choices-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--narrator-color);
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .choices-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .choice-btn {
            padding: 10px 22px;
            border-radius: 40px;
            border: 2px solid var(--primary-lightest);
            background: #ffffff;
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            flex: 1 1 auto;
            min-width: 140px;
            text-align: center;
        }
        .choice-btn:hover {
            background: var(--primary-lightest);
            border-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 74, 122, 0.10);
        }
        .choice-btn:active {
            transform: translateY(0);
        }
        .choice-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ─── scene transition fade ─── */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── reset button ─── */
        .reset-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #fff;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.20);
        }

        /* ─── responsive ─── */
        @media (max-width: 640px) {
            .app-container {
                border-radius: 20px;
            }
            .app-header {
                padding: 16px 18px 12px;
            }
            .app-header h1 {
                font-size: 18px;
            }
            .app-header h1 span {
                font-size: 11px;
                padding: 0 10px;
            }
            .chat-container {
                padding: 16px 16px 8px;
                max-height: 380px;
            }
            .chat-bubble {
                max-width: 92%;
            }
            .chat-bubble .bubble {
                font-size: 14px;
                padding: 10px 14px;
            }
            .chat-bubble .avatar {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            .choices-container {
                padding: 12px 16px 18px;
            }
            .choice-btn {
                font-size: 13px;
                padding: 8px 16px;
                min-width: 100px;
                flex: 1 1 100%;
            }
            .narrator-text {
                font-size: 14px;
                padding: 6px 12px;
            }
            .progress-wrap {
                padding: 6px 16px 0 16px;
            }
        }
        @media (max-width: 400px) {
            .chat-bubble .avatar {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            .chat-bubble .bubble {
                font-size: 13px;
                padding: 8px 12px;
            }
            .app-header h1 {
                font-size: 16px;
            }
        }

        /* ─── scrollable container smooth ─── */
        .chat-container {
            scroll-behavior: smooth;
        }

        /* highlight for citations */
        .citation {
            background: #f0f7ff;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 500;
            color: var(--primary);
            font-style: normal;
            border: 1px solid rgba(74, 155, 213, 0.15);
        }

        /* final scene special */
        .final-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">

        <!-- HEADER -->
        <header class="app-header">
            <h1>
                📋 PA Story
                <span>Simulator</span>
            </h1>
            <div style="display:flex;align-items:center;gap:12px;">
                <span class="scene-indicator" id="sceneIndicator">Scene 1 of 8</span>
                <button class="reset-btn" id="resetBtn">↻ Restart</button>
            </div>
        </header>

        <!-- PROGRESS -->
        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="fill" id="progressFill"></div>
            </div>
            <div class="progress-label">
                <span id="progressLabel">0% complete</span>
                <span id="sceneNameLabel">Doctor Visit</span>
            </div>
        </div>

        <!-- CHAT CONTAINER -->
        <div class="chat-container" id="chatContainer"></div>

        <!-- CHOICES -->
        <div class="choices-container" id="choicesContainer">
            <div class="choices-label" id="choicesLabel">— Choose your response —</div>
            <div class="choices-wrap" id="choicesWrap"></div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ─── DOM refs ───
            const chat = document.getElementById('chatContainer');
            const choicesWrap = document.getElementById('choicesWrap');
            const choicesLabel = document.getElementById('choicesLabel');
            const progressFill = document.getElementById('progressFill');
            const progressLabel = document.getElementById('progressLabel');
            const sceneNameLabel = document.getElementById('sceneNameLabel');
            const sceneIndicator = document.getElementById('sceneIndicator');
            const resetBtn = document.getElementById('resetBtn');

            // ─── helpers ───
            function createBubble(speaker, text, side) {
                const wrapper = document.createElement('div');
                wrapper.className = `chat-bubble ${side}`;

                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = speaker === 'rahul' ? '👦' : '👧';

                const bubble = document.createElement('div');
                bubble.className = 'bubble';

                const nameTag = document.createElement('span');
                nameTag.className = 'name-tag';
                nameTag.textContent = speaker === 'rahul' ? 'Rahul' : 'Priya';

                const msg = document.createElement('p');
                msg.className = 'msg-text';
                msg.textContent = text;

                bubble.appendChild(nameTag);
                bubble.appendChild(msg);
                wrapper.appendChild(avatar);
                wrapper.appendChild(bubble);
                return wrapper;
            }

            function createNarrator(text) {
                const el = document.createElement('div');
                el.className = 'narrator-text';
                el.innerHTML = text;
                return el;
            }

            function scrollToBottom() {
                setTimeout(() => {
                    chat.scrollTop = chat.scrollHeight;
                }, 50);
            }

            function clearChoices() {
                choicesWrap.innerHTML = '';
            }

            function renderChoices(choices, callback) {
                clearChoices();
                choices.forEach((choice, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = choice.label;
                    btn.addEventListener('click', function() {
                        // disable all buttons
                        document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
                        callback(idx);
                    });
                    choicesWrap.appendChild(btn);
                });
                choicesLabel.textContent = '— Choose your response —';
            }

            function disableChoices() {
                document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
                choicesLabel.textContent = '— Continuing story —';
            }

            // ─── Scene Data ───
            // Each scene: { id, name, narrative, messages: [{speaker, text}], choices: [{label, nextSceneId}] }
            // speaker: 'rahul' | 'priya' | 'narrator'
            // For narrator, we use createNarrator (centered italic)
            // For rahul/priya, we use createBubble

            const SCENES = [{
                id: 'scene1',
                name: 'Doctor Visit',
                narrative: `<span class="doctor-name">Dr. Patel</span> examines Rahul at City Medical Center. 
                            "Your blood work shows elevated inflammatory markers — this is consistent with <strong>Rheumatoid Arthritis</strong>. 
                            I'm prescribing <strong>Humira</strong>, a biologic medication that can help manage your symptoms. 
                            But we'll need to get <strong>prior authorization</strong> from your insurance first."`,
                messages: [
                    { speaker: 'rahul', text: 'I\'ve been having joint pain for months. It\'s getting harder to work and take care of my family.' },
                    { speaker: 'priya', text: 'Hi Rahul, I\'m Priya. I help patients navigate the healthcare system. Let me walk you through what prior authorization means for your Humira prescription.' }
                ],
                choices: [
                    { label: '💊 What is prior authorization?', nextSceneId: 'scene2' },
                    { label: '⏳ How long will this take?', nextSceneId: 'scene2' }
                ]
            }, {
                id: 'scene2',
                name: 'Insurance Roadblock',
                narrative: `Dr. Patel's office submits the prior authorization request directly to <strong>StarCare Health</strong> (the payer). 
                            The flow is simple: <strong>Provider → PA Request → Payer</strong>. 
                            No pharmacy involved — this is a medical benefit prior authorization, not a pharmacy benefit. 
                            Once approved, the PA is <strong>saved on file permanently</strong> for this medication.`,
                messages: [
                    { speaker: 'rahul', text: 'So my doctor\'s office handles all of this? I don\'t have to do anything?' },
                    { speaker: 'priya', text: 'That\'s right. The provider\'s office submits the PA directly to StarCare Health. They\'ll review the clinical documentation and make a decision. You\'ll be kept in the loop every step of the way.' }
                ],
                choices: [
                    { label: '📋 What do they check?', nextSceneId: 'scene3' },
                    { label: '🔄 Why does this exist?', nextSceneId: 'scene3' }
                ]
            }, {
                id: 'scene3',
                name: 'What is PA?',
                narrative: `Priya explains prior authorization in plain language — and why it matters beyond just bureaucracy. 
                            <br><br>
                            <span class="citation">📊 AMA 2023 PA Survey:</span> <em>"Prior authorization causes treatment delays in the majority of cases, with 88% of physicians reporting that PA has a negative impact on patient outcomes."</em>
                            <br><br>
                            For aggressive diagnoses like Rheumatoid Arthritis, delays can affect <strong>disease progression</strong> and <strong>long-term joint health</strong>. That's why understanding the process is so important.`,
                messages: [
                    { speaker: 'rahul', text: 'So it\'s like a permission slip from my insurance company?' },
                    { speaker: 'priya', text: 'Exactly! Prior authorization is your insurance company saying "yes, we agree this treatment is medically necessary." It\'s a check to make sure the treatment is appropriate and covered. But for serious conditions, delays can be really stressful — and that\'s why we\'re here to help you navigate it.' }
                ],
                choices: [
                    { label: '🔍 How does the review work?', nextSceneId: 'scene4' },
                    { label: '📝 What do they look for?', nextSceneId: 'scene4' }
                ]
            }, {
                id: 'scene4',
                name: 'Insurance Review',
                narrative: `Priya walks through what <strong>StarCare Health</strong> checks during the prior authorization review:
                            <br><br>
                            <strong>1. Eligibility:</strong> Is the patient covered under the plan?<br>
                            <strong>2. Clinical Documentation:</strong> Does the provider's notes support the diagnosis?<br>
                            <strong>3. ICD-10 Match:</strong> Does the diagnosis code match the requested treatment?<br>
                            <strong>4. Step Therapy History:</strong> Have lower-cost alternatives been tried first?
                            <br><br>
                            Each of these matters because insurance plans use evidence-based guidelines to ensure treatments are appropriate and cost-effective.`,
                messages: [
                    { speaker: 'rahul', text: 'So they\'re checking that everything matches up — the diagnosis, the treatment, and the paperwork?' },
                    { speaker: 'priya', text: 'Exactly right. They want to make sure the treatment is clinically appropriate and that there\'s a clear medical need. If any piece is missing, the PA can be delayed or denied — which is why we\'re so careful about documentation.' }
                ],
                choices: [
                    { label: '⚠️ What if something is missing?', nextSceneId: 'scene5' },
                    { label: '📄 What happens in a denial?', nextSceneId: 'scene5' }
                ]
            }, {
                id: 'scene5',
                name: 'Denial',
                narrative: `The prior authorization is <strong>denied</strong> — reason: <em>missing step therapy documentation</em>. 
                            StarCare Health notes that the patient hasn't tried and failed on lower-cost medications like methotrexate before moving to Humira.
                            <br><br>
                            <span class="citation">📊</span> <strong>Denial ≠ Permanent.</strong> A denial means "not approved as submitted" — not "never approved." 
                            <br><br>
                            <span class="citation">📊</span> According to industry data, <strong>PA denials cost physician offices 2+ staff hours per denial to resolve</strong> — time that could be spent on patient care.`,
                messages: [
                    { speaker: 'rahul', text: 'Denied? What does that mean for me? Does this mean I can\'t get the medication?' },
                    { speaker: 'priya', text: 'Not at all! A denial just means we need to provide more information. The insurance company wants to see documentation that lower-cost options were tried first. This is called "step therapy" — and it\'s actually quite common. We can appeal this decision.' }
                ],
                choices: [
                    { label: '📋 How do we appeal?', nextSceneId: 'scene6' },
                    { label: '📄 What documents do we need?', nextSceneId: 'scene6' }
                ]
            }, {
                id: 'scene6',
                name: 'Appeal',
                narrative: `Priya guides Rahul through the <strong>appeal process</strong>:
                            <br><br>
                            <strong>1. Gather Documentation:</strong> Collect evidence that methotrexate was tried and failed — lab results, clinical notes, and treatment history.<br>
                            <strong>2. Letter of Medical Necessity:</strong> Dr. Patel writes a formal letter explaining why Humira is clinically necessary for Rahul's condition.<br>
                            <strong>3. Formal Appeal Filing:</strong> Submit the appeal package to StarCare Health with all supporting documents.
                            <br><br>
                            The appeal is filed, and the clock starts ticking. StarCare Health has 30 days to respond.`,
                messages: [
                    { speaker: 'rahul', text: 'This is a lot of work for something that feels like it should be simple. But I appreciate you walking me through it.' },
                    { speaker: 'priya', text: 'You\'re welcome, Rahul. This is actually one of the most important parts of the process — making sure the appeal is complete and compelling. We\'re building a strong case for why you need this medication.' }
                ],
                choices: [
                    { label: '⏳ What happens next?', nextSceneId: 'scene7' },
                    { label: '✅ Will it get approved?', nextSceneId: 'scene7' }
                ]
            }, {
                id: 'scene7',
                name: 'Approval',
                narrative: `🎉 <strong>Prior Authorization Approved!</strong>
                            <br><br>
                            StarCare Health has approved Rahul's Humira prescription. The approval is <strong>saved on file permanently</strong> — no repeat PA needed for this medication.
                            <br><br>
                            <strong>Reference Number:</strong> <span class="citation">PA-2024-87342</span>
                            <br><br>
                            The approval means Rahul can now start his Humira treatment. The pharmacy will be notified, and the medication will be available for pickup within 2-3 business days.`,
                messages: [
                    { speaker: 'rahul', text: 'This is such a relief! Thank you so much for all your help, Priya. I feel like I understand the system so much better now.' },
                    { speaker: 'priya', text: 'You\'re welcome, Rahul. I\'m so glad we could get this approved. The important thing now is that you can start your treatment and focus on getting better. And remember — this approval stays on file, so you won\'t have to go through this again for Humira.' }
                ],
                choices: [
                    { label: '👤 What did I learn?', nextSceneId: 'scene8' },
                    { label: '📊 How does the system work?', nextSceneId: 'scene8' }
                ]
            }, {
                id: 'scene8',
                name: 'Takeaways',
                narrative: `<strong>Two perspectives — Patient + System</strong>
                            <br><br>
                            <strong>👤 Patient (Rahul):</strong> "I learned that prior authorization isn't just bureaucracy — it's a process that helps ensure treatments are appropriate and covered. I also learned that denials aren't permanent, and appeals are a normal part of the system. The key is to stay informed and work with your care team."
                            <br><br>
                            <strong>🏥 System (Healthcare Operations):</strong> Health systems track <strong>denial rates, appeal rates, and resolution times</strong> to improve the prior authorization process. Data shows that organizations with dedicated PA teams have significantly better outcomes. <span class="citation">📊</span> According to industry benchmarks, the average denial rate for medical prior authorizations is around 8-12%, with a resolution time of 3-5 days for appeals.
                            <br><br>
                            <strong>✨ Key takeaway:</strong> Prior authorization is a collaborative process between providers, payers, and patients. Understanding the system helps everyone work together more effectively.`,
                messages: [
                    { speaker: 'rahul', text: 'I never realized how much goes into getting a medication approved. But now I understand — and I feel empowered to navigate this system in the future.' },
                    { speaker: 'priya', text: 'That\'s exactly the goal, Rahul. The healthcare system is complex, but with the right knowledge and support, you can absolutely navigate it. And remember — StarCare Health is just one example of how these processes work. Every payer has their own approach, but the principles are the same.' }
                ],
                choices: [
                    { label: '🔄 Restart the story', nextSceneId: 'reset' },
                    { label: '📋 Share what I learned', nextSceneId: 'end' }
                ]
            }];

            // ─── State ───
            let currentSceneIndex = 0;
            let sceneHistory = [];
            let isComplete = false;

            // ─── Render scene ───
            function renderScene(sceneId, choiceVariant) {
                // Find scene by id, or by index
                let sceneIndex = SCENES.findIndex(s => s.id === sceneId);
                if (sceneIndex === -1) {
                    // fallback: use current index
                    sceneIndex = currentSceneIndex;
                }
                const scene = SCENES[sceneIndex];
                if (!scene) return;

                currentSceneIndex = sceneIndex;
                sceneHistory.push(scene.id);

                // Update progress
                const total = SCENES.length;
                const progress = ((sceneIndex) / (total - 1)) * 100;
                progressFill.style.width = `${Math.min(100, progress)}%`;
                progressLabel.textContent = `${Math.round(progress)}% complete`;
                sceneNameLabel.textContent = scene.name;
                sceneIndicator.textContent = `Scene ${sceneIndex + 1} of ${total}`;

                // Clear chat (we'll append all messages fresh)
                // But we want to keep it append-only, so we clear and re-render
                // Actually, the user said "append-only chat feed" — but we need to render the scene
                // We'll clear and re-render for each scene to keep it clean
                // But we want to keep history... let's clear and re-render from scratch
                // Actually, let's keep it simple: clear and render the scene
                // This is a "scene-based" simulator, not a continuous chat
                chat.innerHTML = '';

                // 1. Narrative
                if (scene.narrative) {
                    const narr = createNarrator(scene.narrative);
                    chat.appendChild(narr);
                }

                // 2. Messages
                scene.messages.forEach(msg => {
                    if (msg.speaker === 'rahul') {
                        chat.appendChild(createBubble('rahul', msg.text, 'left'));
                    } else if (msg.speaker === 'priya') {
                        chat.appendChild(createBubble('priya', msg.text, 'right'));
                    } else {
                        // narrator fallback
                        const narr = createNarrator(msg.text);
                        chat.appendChild(narr);
                    }
                });

                scrollToBottom();

                // 3. Choices
                if (scene.choices && scene.choices.length > 0 && !isComplete) {
                    const isLastScene = sceneIndex === SCENES.length - 1;
                    renderChoices(scene.choices, function(choiceIndex) {
                        const choice = scene.choices[choiceIndex];
                        if (choice.nextSceneId === 'reset') {
                            resetStory();
                            return;
                        }
                        if (choice.nextSceneId === 'end') {
                            // Show final message
                            disableChoices();
                            choicesLabel.textContent = '🎉 Story complete!';
                            isComplete = true;
                            // Show a final message
                            const finalMsg = createNarrator(
                                '<strong>✅ Story Complete!</strong><br>You\'ve experienced the full prior authorization journey — from diagnosis to approval. You now understand the key steps, challenges, and strategies for navigating the PA process. <br><br> <span class="citation">📋</span> <strong>Key takeaway:</strong> Prior authorization is a collaborative process. With the right knowledge and support, patients can successfully navigate the system.'
                            );
                            chat.appendChild(finalMsg);
                            scrollToBottom();
                            return;
                        }
                        // Find next scene
                        const nextScene = SCENES.find(s => s.id === choice.nextSceneId);
                        if (nextScene) {
                            renderScene(choice.nextSceneId, choiceIndex);
                        } else {
                            // fallback: advance by index
                            const nextIdx = sceneIndex + 1;
                            if (nextIdx < SCENES.length) {
                                renderScene(SCENES[nextIdx].id, choiceIndex);
                            }
                        }
                    });
                } else {
                    // No choices — auto-advance?
                    if (sceneIndex < SCENES.length - 1) {
                        // Auto advance after a delay
                        disableChoices();
                        choicesLabel.textContent = '— Continuing story —';
                        setTimeout(() => {
                            const nextScene = SCENES[sceneIndex + 1];
                            if (nextScene) {
                                renderScene(nextScene.id, 0);
                            }
                        }, 1200);
                    } else {
                        choicesLabel.textContent = '— The End —';
                        disableChoices();
                    }
                }
            }

            // ─── Reset ───
            function resetStory() {
                currentSceneIndex = 0;
                sceneHistory = [];
                isComplete = false;
                chat.innerHTML = '';
                clearChoices();
                choicesLabel.textContent = '— Choose your response —';
                renderScene(SCENES[0].id, 0);
                // Enable buttons
                document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
                scrollToBottom();
            }

            // ─── Init ───
            function init() {
                resetStory();
            }

            // ─── Reset button ───
            resetBtn.addEventListener('click', resetStory);

            // ─── Start ───
            init();

            // ─── Handle window resize for scroll ───
            window.addEventListener('resize', scrollToBottom);

            console.log('📋 Prior Authorization Story Simulator loaded.');
            console.log('📚 Scenes:', SCENES.map(s => s.name).join(' → '));

        })();
    </script>

</body>
</html>
